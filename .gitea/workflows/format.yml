name: Format Check

on:
  push:
    paths:
      - "**/*.yml"
      - "flake.lock"
      - "flake.nix"
      - "src/**"
      - "treefmt.nix"
  pull_request:
    paths:
      - "**/*.yml"
      - "flake.lock"
      - "flake.nix"
      - "src/**"
      - "treefmt.nix"

jobs:
  format:
    name: treefmt
    runs-on: nix
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # required for `nix flake show`
      - name: Check formatting
        run: nix develop --command nix fmt -- --fail-on-change src/
